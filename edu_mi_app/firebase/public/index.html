<!DOCTYPE html>
<html>

<head>
  <title>Redirigiendo a Edu Mi App...</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify_content: center;
      height: 100vh;
      background-color: #f0f2f5;
      color: #333;
      text-align: center;
    }

    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .btn {
      background-color: #3498db;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 20px;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="loader"></div>
  <h2>Autenticación Exitosa</h2>
  <p>Estamos redirigiéndote de vuelta a la aplicación...</p>
  <p id="status">Si no sucede nada, haz clic en el botón de abajo.</p>

  <a id="manual-link" href="#" class="btn">Abrir Aplicación</a>

  <script>
    // Obtener el hash (donde viene el access_token en Implicit Flow)
    const hash = window.location.hash;
    // Obtener search params (por si acaso viene algo ahí)
    const search = window.location.search;

    // Construir el deep link
    // Pasamos todo lo que recibimos
    let deepLink = 'stemforall://auth-callback/';

    if (hash) {
      deepLink += hash; // #access_token=...
    } else if (search) {
      deepLink += search; // ?code=... (fallback)
    }

    // Configurar el botón manual
    document.getElementById('manual-link').href = deepLink;

    // Intentar redirección automática
    console.log('Redirigiendo a:', deepLink);
    window.location.href = deepLink;

    // Mostrar mensaje si tarda
    setTimeout(() => {
      document.getElementById('status').innerText = 'Parece que está tardando. Por favor usa el botón.';
    }, 3000);
  </script>
</body>

</html>
