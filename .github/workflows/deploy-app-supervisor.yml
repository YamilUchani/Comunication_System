name: Deploy App_Supervisor to Pages

on:
  push:
    branches: ["main"]
    paths: ["App_Supervisor/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload App_Supervisor
        uses: actions/upload-pages-artifact@v3
        with:
          path: App_Supervisor
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
